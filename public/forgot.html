<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>找回密码 - RyuWebAuth</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: -apple-system, "Segoe UI", "Microsoft YaHei", sans-serif; background: #f4f5f6; margin: 0; padding: 40px 16px; color: #1f2937; }
    .card { max-width: 420px; margin: 0 auto; background: #fff; padding: 28px 30px 34px; border-radius: 14px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
    h1 { font-size: 22px; margin: 0 0 4px; }
    .sub { color: #6b7280; font-size: 13px; margin-bottom: 20px; }
    label { display: block; margin: 14px 0 6px; font-size: 14px; color: #374151; }
    input[type="text"], input[type="password"], input[type="email"] {
      width: 100%; padding: 11px 12px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 15px; outline: none;
    }
    input:focus { border-color: #111827; box-shadow: 0 0 0 3px rgba(17,24,39,0.12); }
    .pw-wrap { position: relative; }
    .pw-eye { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; width: auto; margin: 0; padding: 4px; color: #6b7280; display: inline-flex; align-items: center; line-height: 0; }
    button { margin-top: 18px; padding: 11px 20px; font-size: 15px; border: none; border-radius: 8px; background: #374151; color: #fff; cursor: pointer; width: 100%; }
    button:hover { background: #1f2937; }
    .msg { margin-top: 14px; padding: 11px 13px; border-radius: 8px; font-size: 13px; display: none; white-space: pre-wrap; line-height: 1.5; }
    .ok { background: #ecfdf5; color: #065f46; border: 1px solid #6ee7b7; }
    .err { background: #fef2f2; color: #991b1b; border: 1px solid #fca5a5; }
    .hint { font-size: 12px; color: #6b7280; margin-top: 6px; }
    .tabs { display: flex; gap: 0; margin-bottom: 18px; border-bottom: 1px solid #e5e7eb; }
    .tab { padding: 8px 16px; cursor: pointer; font-size: 14px; color: #6b7280; border-bottom: 2px solid transparent; }
    .tab.active { color: #374151; font-weight: 600; border-bottom-color: #374151; }
    .pane { display: none; }
    .pane.active { display: block; }
    .links { margin-top: 18px; font-size: 14px; }
    .links a { color: #374151; text-decoration: none; }
    .links a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <h1>找回密码</h1>
    <div class="sub">通过邮箱验证码或密保问题重置密码</div>

    <div class="tabs">
      <div class="tab active" data-tab="email">邮箱验证</div>
      <div class="tab" data-tab="question">密保问题</div>
    </div>

    <div id="pane-email" class="pane active">
      <label for="f-email">邮箱</label>
      <input type="email" id="f-email" placeholder="注册邮箱" />
      <button id="btn-send">发送验证码</button>
      <div id="code-box" style="display:none; margin-top:14px;">
        <label for="f-code">验证码</label>
        <input type="text" id="f-code" maxlength="6" placeholder="6 位数字" />
      </div>
      <label for="newpw1">新密码</label>
      <div class="pw-wrap">
        <input type="password" id="newpw1" placeholder="至少 8 位" />
        <button type="button" class="pw-eye pw-toggle-new" aria-label="显示/隐藏密码" title="显示/隐藏密码"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="#6b7280" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button>
      </div>
    </div>

    <div id="pane-question" class="pane">
      <label for="identifier">用户名或邮箱</label>
      <input type="text" id="identifier" placeholder="用户名 / 邮箱" />
      <button id="btn-q">获取密保问题</button>
      <div id="q-box" style="display:none; margin-top:14px;">
        <div id="question" class="hint" style="font-size:14px; color:#374151; margin-bottom:8px;"></div>
        <label for="answer">答案</label>
        <input type="text" id="answer" placeholder="密保答案" />
        <label for="newpw2">新密码</label>
        <div class="pw-wrap">
          <input type="password" id="newpw2" placeholder="新密码" />
          <button type="button" class="pw-eye pw-toggle-new" aria-label="显示/隐藏密码" title="显示/隐藏密码"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="#6b7280" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button>
        </div>
      </div>
    </div>

    <button id="btn-reset">重置密码</button>
    <div id="result" class="msg"></div>
    <div class="links"><a href="/login.html">返回登录</a></div>
  </div>
  <script src="/forgot.js"></script>
</body>
</html>
